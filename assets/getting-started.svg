<svg viewBox="0 0 480 160" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg6" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a1714"/>
      <stop offset="100%" stop-color="#0f0e0d"/>
    </linearGradient>
  </defs>
  <rect width="480" height="160" fill="url(#bg6)" rx="12"/>
  <!-- Step 1 -->
  <rect x="20" y="20" width="130" height="120" rx="8" fill="#211d1a" stroke="#2a2521" stroke-width="1"/>
  <circle cx="85" cy="55" r="18" fill="#29231f" stroke="#d45a22" stroke-width="1.5"/>
  <text x="85" y="60" fill="#ff6b2b" font-family="Inter,system-ui,sans-serif" font-size="14" font-weight="700" text-anchor="middle">1</text>
  <text x="85" y="88" fill="#f0e5d8" font-family="Inter,system-ui,sans-serif" font-size="10" font-weight="600" text-anchor="middle">Connect</text>
  <text x="85" y="104" fill="#81756d" font-family="Inter,system-ui,sans-serif" font-size="8" text-anchor="middle">Add your API key</text>
  <text x="85" y="116" fill="#81756d" font-family="Inter,system-ui,sans-serif" font-size="8" text-anchor="middle">in Settings</text>
  <!-- Arrow -->
  <line x1="155" y1="80" x2="172" y2="80" stroke="#ff6b2b" stroke-width="2" marker-end="url(#arrow)"/>
  <defs><marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto"><path d="M0,0 L10,5 L0,10" fill="#ff6b2b"/></marker></defs>
  <!-- Step 2 -->
  <rect x="175" y="20" width="130" height="120" rx="8" fill="#211d1a" stroke="#2a2521" stroke-width="1"/>
  <circle cx="240" cy="55" r="18" fill="#29231f" stroke="#d45a22" stroke-width="1.5"/>
  <text x="240" y="60" fill="#ff6b2b" font-family="Inter,system-ui,sans-serif" font-size="14" font-weight="700" text-anchor="middle">2</text>
  <text x="240" y="88" fill="#f0e5d8" font-family="Inter,system-ui,sans-serif" font-size="10" font-weight="600" text-anchor="middle">Enable Tools</text>
  <text x="240" y="104" fill="#81756d" font-family="Inter,system-ui,sans-serif" font-size="8" text-anchor="middle">Toggle Terminal,</text>
  <text x="240" y="116" fill="#81756d" font-family="Inter,system-ui,sans-serif" font-size="8" text-anchor="middle">Files, Graphs</text>
  <!-- Arrow -->
  <line x1="310" y1="80" x2="327" y2="80" stroke="#ff6b2b" stroke-width="2" marker-end="url(#arrow)"/>
  <!-- Step 3 -->
  <rect x="330" y="20" width="130" height="120" rx="8" fill="#211d1a" stroke="#2a2521" stroke-width="1"/>
  <circle cx="395" cy="55" r="18" fill="#29231f" stroke="#d45a22" stroke-width="1.5"/>
  <text x="395" y="60" fill="#ff6b2b" font-family="Inter,system-ui,sans-serif" font-size="14" font-weight="700" text-anchor="middle">3</text>
  <text x="395" y="88" fill="#f0e5d8" font-family="Inter,system-ui,sans-serif" font-size="10" font-weight="600" text-anchor="middle">Ask Lava</text>
  <text x="395" y="104" fill="#81756d" font-family="Inter,system-ui,sans-serif" font-size="8" text-anchor="middle">Chat naturally,</text>
  <text x="395" y="116" fill="#81756d" font-family="Inter,system-ui,sans-serif" font-size="8" text-anchor="middle">it uses your computer</text>
</svg>