<svg viewBox="0 0 480 280" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg2" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a1714"/>
      <stop offset="100%" stop-color="#0f0e0d"/>
    </linearGradient>
  </defs>
  <rect width="480" height="280" fill="url(#bg2)" rx="12"/>
  <rect x="16" y="16" width="448" height="248" fill="#211d1a" rx="8"/>
  <!-- Titlebar -->
  <rect x="16" y="16" width="448" height="28" fill="#141210" rx="8 8 0 0"/>
  <text x="36" y="35" fill="#f0e5d8" font-family="Inter,system-ui,sans-serif" font-size="13" font-weight="600">Graphs &amp; Slides</text>
  <!-- Sidebar -->
  <rect x="16" y="44" width="140" height="220" fill="#151311"/>
  <rect x="30" y="60" width="100" height="24" rx="4" fill="#261f1a"/>
  <rect x="40" y="68" width="60" height="5" rx="2" fill="#f0e5d8" opacity="0.4"/>
  <!-- Sub tabs -->
  <rect x="166" y="48" width="60" height="22" rx="4" fill="#261f1a" stroke="#d45a2240" stroke-width="1"/>
  <text x="196" y="63" fill="#f0e5d8" font-family="Inter,system-ui,sans-serif" font-size="9" text-anchor="middle">Graphs</text>
  <rect x="232" y="48" width="50" height="22" rx="4" fill="none"/>
  <text x="257" y="63" fill="#81756d" font-family="Inter,system-ui,sans-serif" font-size="9" text-anchor="middle">Slides</text>
  <!-- Mermaid diagram -->
  <rect x="170" y="80" width="278" height="170" rx="6" fill="#0c0b0a" stroke="#2a2521" stroke-width="1"/>
  <!-- Flowchart nodes -->
  <rect x="260" y="100" width="100" height="28" rx="6" fill="#29231f" stroke="#d45a22" stroke-width="1.5"/>
  <text x="310" y="118" fill="#f0e5d8" font-family="Inter,system-ui,sans-serif" font-size="9" text-anchor="middle">Start</text>
  <polygon points="310,145 325,158 310,171 295,158" fill="#1a1714" stroke="#ff6b2b" stroke-width="1.5"/>
  <text x="310" y="161" fill="#81756d" font-family="Inter,system-ui,sans-serif" font-size="7" text-anchor="middle">?</text>
  <rect x="215" y="185" width="80" height="28" rx="6" fill="#29231f" stroke="#3a312b" stroke-width="1"/>
  <rect x="325" y="185" width="80" height="28" rx="6" fill="#29231f" stroke="#3a312b" stroke-width="1"/>
  <!-- Arrows -->
  <line x1="310" y1="128" x2="310" y2="145" stroke="#81756d" stroke-width="1"/>
  <line x1="295" y1="158" x2="255" y2="185" stroke="#81756d" stroke-width="1"/>
  <line x1="325" y1="158" x2="365" y2="185" stroke="#81756d" stroke-width="1"/>
  <!-- Open button -->
  <rect x="370" y="80" width="70" height="24" rx="4" fill="#d45a22"/>
  <text x="405" y="96" fill="white" font-family="Inter,system-ui,sans-serif" font-size="9" font-weight="600" text-anchor="middle">Open</text>
</svg>